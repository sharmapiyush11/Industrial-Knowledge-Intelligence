version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ib_db
    environment:
      POSTGRES_DB: industrial_brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ib_network

  neo4j:
    image: neo4j:5.12-community
    container_name: ib_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - ib_network

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: ib_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/data
    networks:
      - ib_network

  backend:
    build: ./backend
    container_name: ib_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/industrial_brain
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      - db
      - neo4j
      - chromadb
    volumes:
      - ./backend:/app
    networks:
      - ib_network

  frontend:
    build: ./frontend
    container_name: ib_frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - ib_network

volumes:
  pg_data:
  neo4j_data:
  chroma_data:

networks:
  ib_network:
    driver: bridge
